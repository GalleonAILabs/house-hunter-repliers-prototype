<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>House Hunter</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIINfQ2ATb8EOlLp3hZNvj8NfN1lvTlZBo=" crossorigin="" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="topbar">
    <div class="topbar-left">
      <h1>House Hunter</h1>
      <span class="pill" id="sourcePill">POC</span>
    </div>
    <div class="topbar-right">
      <div class="view-toggle">
        <button class="view-btn active" id="btnMap" data-view="map">🗺 Map</button>
        <button class="view-btn" id="btnList" data-view="list">☰ List</button>
      </div>
      <button class="icon-btn" id="settingsBtn" title="Card settings">⚙</button>
    </div>
  </header>

  <!-- SETTINGS PANEL -->
  <div class="settings-overlay" id="settingsOverlay" hidden></div>
  <aside class="settings-drawer" id="settingsDrawer" hidden>
    <div class="settings-header">
      <span class="settings-title">Card settings</span>
      <button class="close-btn" id="settingsClose">✕</button>
    </div>
    <p class="settings-desc">Toggle which sections appear on each listing card. Changes are saved automatically.</p>
    <div class="settings-fields" id="settingsFields"></div>
    <div class="settings-footer">
      <button id="settingsSelectAll" class="secondary">All on</button>
      <button id="settingsSelectNone" class="secondary">All off</button>
      <button id="settingsReset">Defaults</button>
    </div>
  </aside>

  <!-- FILTERS -->
  <details class="filterbox">
    <summary id="filterSummary">Filters</summary>
    <section class="controls">
      <label>Data source
        <select id="source">
          <option value="poc" selected>My POC data</option>
          <option value="repliers">Repliers sample</option>
        </select>
      </label>
      <label>Search
        <input id="q" placeholder="address, town, features" />
      </label>
      <label>Min price
        <input id="minPrice" type="number" placeholder="0" />
      </label>
      <label>Max price
        <input id="maxPrice" type="number" placeholder="1500000" />
      </label>
      <label>Min beds
        <input id="minBeds" type="number" min="0" placeholder="4" />
      </label>
      <label>Min baths
        <input id="minBaths" type="number" min="0" step="0.5" placeholder="2" />
      </label>
      <label>Min fit
        <select id="minFit">
          <option value="">Any</option>
          <option value="4">4+</option>
          <option value="5">5+</option>
          <option value="6">6+</option>
          <option value="7">7+</option>
          <option value="8">8/8</option>
        </select>
      </label>
      <label>Status
        <select id="filterStatus">
          <option value="">All</option>
          <option value="active">Active only</option>
          <option value="rejected">Rejected</option>
        </select>
      </label>
      <label>Page size
        <select id="resultsPerPage">
          <option>30</option>
          <option selected>60</option>
          <option>100</option>
        </select>
      </label>
      <button id="load">Apply</button>
      <button id="reset" class="secondary">Reset</button>
    </section>
  </details>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <span id="summary">Loading…</span>
    <label class="sort-inline">Sort
      <select id="sort">
        <option value="fit-desc">Fit ↓</option>
        <option value="price-asc">Price ↑</option>
        <option value="price-desc">Price ↓</option>
        <option value="go-asc">Commute ↑</option>
        <option value="sqft-desc">Sqft ↓</option>
        <option value="lot-desc">Lot ↓</option>
        <option value="markrank-desc">Mark ↓</option>
      </select>
    </label>
  </div>

  <!-- MAP VIEW -->
  <div id="viewMap" class="view-section">
    <div id="map"></div>
    <!-- Map card popup (shown when pin is clicked) -->
    <div id="mapCard" class="map-card" hidden>
      <button class="map-card-close" id="mapCardClose">✕</button>
      <div class="map-card-inner" id="mapCardInner"></div>
    </div>
  </div>

  <!-- LIST VIEW -->
  <div id="viewList" class="view-section" hidden>
    <div id="cards" class="cards"></div>
  </div>

  <!-- CARD TEMPLATE -->
  <template id="cardTemplate">
    <article class="card">
      <div class="card-photo-wrap">
        <img class="photo" alt="" />
        <span class="card-status-badge"></span>
      </div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-title-block">
            <h3 class="address"></h3>
            <p class="meta"></p>
          </div>
          <div class="fit-badge"></div>
        </div>
        <div class="card-price cf-price"></div>
        <div class="card-commute cf-commute"></div>
        <div class="card-stats cf-stats"></div>
        <div class="card-financial cf-financial"></div>
        <div class="card-ratings cf-ratings"></div>
        <div class="card-fit-tags cf-fit"></div>
        <div class="card-features cf-features"></div>
        <div class="card-comments cf-comments"></div>
        <div class="card-actions cf-actions">
          <a class="card-link-btn" target="_blank" rel="noopener">View listing</a>
          <a class="card-doc-btn" target="_blank" rel="noopener">Research doc</a>
          <button class="show-map secondary">📍 Map</button>
        </div>
      </div>
    </article>
  </template>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="/app.js"></script>
</body>
</html>
